name: YouTube Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Get Chrome version
        id: chrome-version
        run: |
          $version = (Get-Item "C:\Program Files\Google\Chrome\Application\chrome.exe").VersionInfo.FileVersion
          echo "Chrome version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Download matching ChromeDriver
        run: |
          $chromeVersion = "${{ steps.chrome-version.outputs.version }}"
          $driverUrl = "https://storage.googleapis.com/chrome-for-testing-public/$chromeVersion/win64/chromedriver-win64.zip"
          Write-Host "Downloading ChromeDriver $chromeVersion"
          Invoke-WebRequest -Uri $driverUrl -OutFile "chromedriver.zip"
          Expand-Archive -Path "chromedriver.zip" -DestinationPath "." -Force
          Copy-Item ".\chromedriver-win64\chromedriver.exe" ".\bin\Debug\net8.0\chromedriver.exe" -Force
          Copy-Item ".\chromedriver-win64\chromedriver.exe" ".\chromedriver.exe" -Force
          Write-Host "ChromeDriver installed!"

      - name: Restore packages
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run Tests
        run: dotnet test --no-build --logger "trx;LogFileName=results.trx"
        env:
          CI: true

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestReport-${{ github.run_number }}
          path: |
            Reports/TestReport.html
            TestResults/